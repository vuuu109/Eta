name: Android Cloud Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null || true

      - name: List available Android SDK platforms
        run: |
          echo "=== Channel 3 ==="
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --channel=3 --list 2>&1 | grep "android-3" | head -20 || echo "No android-3x found"
          echo "=== All platforms ==="
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list 2>&1 | grep "platforms;" | head -30

      - name: Install SDK packages
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --channel=3 \
            "platforms;android-37" \
            "build-tools;36.0.0" \
            "platform-tools"