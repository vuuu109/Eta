name: Android Cloud Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/android-cloud-build.yml'
      - 'app/**'
      - 'gradle/**'
      - 'gradle.properties'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradlew'
      - 'gradlew.bat'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null || true

      - name: Install SDK packages
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --channel=3 \
            "platforms;android-37" \
            "build-tools;37.0.0" \
            "platform-tools"

      - name: Build APKs
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug assembleRelease --stacktrace --no-daemon -Pandroid.injected.invoked.from.ide=false

      - name: Sign release APK with CI key
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/eta-ci.keystore
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: eta-ci
          KEY_PASSWORD: android
        run: |
          keytool -genkeypair -v \
            -keystore "$KEYSTORE_PATH" \
            -storepass "$KEYSTORE_PASSWORD" \
            -alias "$KEY_ALIAS" \
            -keypass "$KEY_PASSWORD" \
            -dname "CN=Eta CI, OU=CI, O=GitHub Actions, L=Cloud, S=Cloud, C=US" \
            -keyalg RSA -keysize 2048 -validity 36500
          apksigner sign \
            --ks "$KEYSTORE_PATH" \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass pass:"$KEYSTORE_PASSWORD" \
            --key-pass pass:"$KEY_PASSWORD" \
            --out app/build/outputs/apk/release/app-release-ci-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
          apksigner verify app/build/outputs/apk/release/app-release-ci-signed.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: eta-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: eta-release-ci-signed-apk
          path: app/build/outputs/apk/release/app-release-ci-signed.apk
          if-no-files-found: error

      - name: Upload unsigned release APK
        uses: actions/upload-artifact@v4
        with:
          name: eta-release-unsigned-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error