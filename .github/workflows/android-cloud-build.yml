name: Android Cloud Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null || true

      - name: Check available build-tools
        run: |
          echo "=== Build Tools ==="
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --channel=3 --list 2>&1 | grep "build-tools;" | head -20

      - name: Install SDK packages
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --channel=3 \
            "platforms;android-37.0" \
            "build-tools;37.0.0" \
            "platform-tools"

      - name: Build APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon -Pandroid.injected.invoked.from.ide=false

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: eta-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error